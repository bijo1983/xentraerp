    <path d="M128 198 L212 132" />
    <path d="M152 206 L216 162" />
    <path d="M72 146 C70 136 74 122 86 114 L182 50 C212 30 248 36 264 66 C274 84 274 108 262 124 L188 220 C174 238 150 244 132 234 C110 222 86 190 80 168" />
