[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18.20.8"
  NPM_CONFIG_PRODUCTION = "false"
  # Disable Netlify's secret scanning extension and extension API lookups.
  SECRETS_SCAN_ENABLED = "false"
  NETLIFY_USE_EXTENSION_API = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
